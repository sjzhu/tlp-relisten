<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy TLP Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit {
      background: #667eea;
      color: white;
    }

    .btn-submit:hover {
      background: #5568d3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-reset {
      background: #f0f0f0;
      color: #333;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }

    .results {
      margin-top: 40px;
      display: none;
    }

    .results.show {
      display: block;
    }

    .result-header {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }

    .result-date {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .result-week {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    .episodes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .episode-item {
      padding: 15px;
      background: #f8f9fa;
      border-radius: 4px;
      border-left: 4px solid #e0e0e0;
      transition: all 0.2s;
    }

    .episode-item:hover {
      border-left-color: #667eea;
      background: #f0f2ff;
    }

    .episode-name {
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .episode-link {
      font-size: 12px;
    }

    .episode-link a {
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
    }

    .episode-link a:hover {
      text-decoration: underline;
    }

    .no-link {
      color: #999;
      font-size: 12px;
      font-style: italic;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid #c33;
      margin-top: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .loading {
      color: #666;
      font-style: italic;
      margin-top: 20px;
      display: none;
    }

    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Easy TLP Tracker</h1>
    <p class="subtitle">Find episodes for any week in the schedule</p>

    <div class="form-group">
      <label for="date-input">Date (optional)</label>
      <input
        type="date"
        id="date-input"
        placeholder="Leave blank for today"
      >
    </div>

    <div class="button-group">
      <button class="btn-submit" id="submit-btn">Get Episodes</button>
      <button class="btn-reset" id="reset-btn">Reset</button>
    </div>

    <div class="loading" id="loading">Loading schedule...</div>

    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="result-header">
        <div class="result-date" id="requested-date"></div>
        <div class="result-week" id="week-range"></div>
      </div>
      <div class="episodes-list" id="episodes-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
